<div class="container vh-100 d-flex align-items-center justify-content-center">
  <div class="card p-4 shadow" style="width: 380px;">
    <h3 class="text-center mb-4">Registro</h3>

    <div class="mb-3">
      <input
        type="text"
        class="form-control"
        placeholder="nombre"
        [(ngModel)]="nombre"
      />
    </div>

    <div class="mb-3">
      <input
        type="email"
        class="form-control"
        placeholder="correo"
        [(ngModel)]="correo"
      />
    </div>

    <div class="mb-3">
      <input
        type="password"
        class="form-control"
        placeholder="clave"
        [(ngModel)]="clave"
      />
    </div>

    <div *ngIf="error" class="alert alert-danger py-1 text-center">
      {{ error }}
    </div>

    <div class="d-flex justify-content-center mb-3">
      <button class="btn btn-outline-secondary px-4" (click)="registrar()">
        Registrarse
      </button>
    </div>

    <div class="text-center">
      <a routerLink="/login" class="text-primary">¿Ya tienes cuenta?
